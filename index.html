<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UNREALM</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- NAVBAR -->

    <header>

        <nav class="navbar">

            <div class="logo">
                UNREALM
            </div>

            <ul class="nav-links">

                <li><a href="#explorar">Explorar</a></li>

                <li><a href="#scratch">Scratch</a></li>

                <li><a href="#rpgmaker">RPGMaker</a></li>

                <li><a href="#unity">Unity 3D (Universal)</a></li>

            </ul>

        </nav>

    </header>

    <!-- HERO -->

    <section class="hero" id="explorar">

        <div class="hero-content">
        </div>

    </section>

    <!-- GRID DE JUEGOS -->

    <section class="games-grid">

        <!-- SCRATCH -->

        <div class="game-card" id="scratch">

            <h2>Scratch</h2>

            <video controls>
                <source src="./videos/scratch.mp4" type="video/mp4">
                Tu navegador no soporta video HTML5.
            </video>

        </div>

        <!-- RPG MAKER -->

        <div class="game-card" id="rpgmaker">

            <h2>RPGMaker</h2>

            <video controls>
                <source src="./videos/rpgmaker.mp4" type="video/mp4">
                Tu navegador no soporta video HTML5.
            </video>

        </div>

        <!-- UNITY -->

        <div class="game-card" id="unity">

            <h2>Unity 3D</h2>

            <video controls>
                <source src="./videos/unity.mp4" type="video/mp4">
                Tu navegador no soporta video HTML5.
            </video>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
